<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servis Puantajı</title>
    <!-- iOS PWA Support -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Puantaj">
    <meta name="theme-color" content="#f8fafc">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3045/3045501.png">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* Custom scrollbar for beautiful grid scrolling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Eliminate input arrows natively */
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Print Layout */
        @media print {
            @page {
                size: A4 landscape;
                margin: 0; /* Hides browser URL/Date headers */
            }
            body {
                margin: 10mm !important; /* Move margin to body */
                overflow: visible !important;
                height: auto !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            body > header, 
            body > div:not(#print-section) {
                display: none !important;
            }
            #print-section {
                display: block !important;
                width: 100%;
            }
            table.print-table {
                width: 100%;
                table-layout: fixed;
            }
            table.print-table th, table.print-table td {
                overflow: hidden;
                white-space: nowrap;
                text-align: center;
            }
        }
    </style>
</head>

<body class="h-screen w-screen flex flex-col overflow-hidden text-slate-800">

    <!-- Header Bar -->
    <header
        class="bg-white border-b border-slate-200 px-4 py-2 flex items-center justify-between shadow-sm z-20 shrink-0">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-50 text-indigo-600 rounded-lg border border-indigo-100 shadow-sm flex items-center justify-center">
                <i data-lucide="calendar-days" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-base font-bold tracking-tight text-slate-900 leading-none" id="header-title">Puantaj Yükleniyor...</h1>
                <p class="text-[10px] font-medium text-slate-500 mt-1" id="header-subtitle">Lütfen Bekleyin</p>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <!-- Summary Stats -->
            <div class="hidden md:flex items-center gap-4 bg-slate-50 px-3 py-1 rounded-lg border border-slate-200">
                <div class="text-center">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">Vardiya</p>
                    <p class="text-[13px] font-black text-indigo-600 leading-tight mt-0.5" id="summary-vardiya">0</p>
                </div>
                <div class="w-px h-6 bg-slate-200"></div>
                <div class="text-center">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">Tek</p>
                    <p class="text-[13px] font-black text-orange-500 leading-tight mt-0.5" id="summary-tek">0</p>
                </div>
                <div class="w-px h-6 bg-slate-200"></div>
                <div class="text-center">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">Genel</p>
                    <p class="text-[13px] font-black text-slate-800 leading-tight mt-0.5" id="summary-genel">0</p>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-1.5 border-l border-slate-200 pl-2 ml-1">
                <input type="month" id="filter-donem" onchange="window.changeDonem()" class="text-xs font-bold bg-slate-50 border border-slate-200 rounded-md px-2 py-1 text-slate-700 focus:outline-none focus:ring-1 focus:ring-indigo-500 cursor-pointer" title="Dönem Seç">
                <div class="w-px h-4 bg-slate-200 mx-0.5"></div>
                <select id="filter-arac" onchange="window.filterPuantaj()" class="text-xs font-bold bg-slate-50 border border-slate-200 rounded-md px-2 py-1 text-slate-700 focus:outline-none focus:ring-1 focus:ring-indigo-500 max-w-[120px]">
                    <option value="ALL">Tüm Araçlar</option>
                </select>
                <div class="w-px h-4 bg-slate-200 mx-0.5"></div>
                <select id="bulk-fill-value" class="text-xs font-bold bg-slate-50 border border-slate-200 rounded-md px-2 py-1 text-slate-700 focus:outline-none focus:ring-1 focus:ring-indigo-500">
                    <option value="1">1 (Tam)</option>
                    <option value="X">X (Tatil)</option>
                    <option value="R">R (Rapor)</option>
                    <option value="İ">İ (İzin)</option>
                </select>
                <button onclick="bulkFillAll()" class="px-2 py-1 text-xs font-bold bg-slate-100 text-slate-700 hover:bg-slate-200 border border-slate-200 rounded-md transition-colors flex items-center gap-1" title="Tüm Boşlukları Doldur">
                    <i data-lucide="layers" class="w-3.5 h-3.5"></i> Tümü
                </button>
                <button onclick="autoFillWeekdays()" class="px-2 py-1 text-xs font-bold bg-amber-50 text-amber-700 hover:bg-amber-100 border border-amber-200 rounded-md transition-colors flex items-center gap-1" title="Sadece Hafta İçi Boşlukları Doldur">
                    <i data-lucide="zap" class="w-3.5 h-3.5"></i> H. İçi
                </button>
            </div>
            <div class="w-px h-5 bg-slate-200 mx-1"></div>
            <button onclick="saveExcelGrid()"
                class="px-3 py-1.5 text-xs font-bold bg-indigo-600 text-white hover:bg-indigo-700 rounded-md transition-colors shadow-sm shadow-indigo-600/20 flex items-center gap-1.5">
                <i data-lucide="save" class="w-3.5 h-3.5"></i> Kaydet
            </button>
            <button onclick="window.handlePrint()"
                class="p-1.5 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-md transition-colors"
                title="Yazdır">
                <i data-lucide="printer" class="w-4 h-4"></i>
            </button>
        </div>
    </header>

    <!-- Legend -->
    <div
        class="bg-slate-50 border-b border-slate-200 px-6 py-2 flex items-center gap-6 text-xs font-medium shrink-0 z-10">
        <span class="flex items-center gap-2 text-slate-600"><span
                class="w-3 h-3 rounded bg-blue-50 border border-blue-200 shadow-sm"></span>Sayısal Değer = Sefer
            Sayısı</span>
        <span class="flex items-center gap-2 text-slate-600"><span
                class="w-3 h-3 rounded bg-red-50 border border-red-200 shadow-sm text-red-600 flex items-center justify-center font-bold text-[8px]">X</span>Tatil
            / Yok</span>
        <span class="flex items-center gap-2 text-slate-600"><span
                class="w-3 h-3 rounded bg-amber-50 border border-amber-200 shadow-sm text-amber-600 flex items-center justify-center font-bold text-[8px]">R</span>Raporlu</span>
        <span class="flex items-center gap-2 text-slate-600"><span
                class="w-3 h-3 rounded bg-purple-50 border border-purple-200 shadow-sm text-purple-600 flex items-center justify-center font-bold text-[8px]">İ</span>İzinli</span>
    </div>

    <!-- Main Grid Container -->
    <div class="flex-1 overflow-auto bg-slate-100 p-4 md:p-6" id="grid-container">
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 mx-auto"
            style="width: max-content; min-width: max-content; padding-bottom: 20px;">
            <table class="text-left border-collapse" id="excel-table"
                style="table-layout: fixed; width: max-content; min-width: max-content;">
                <thead id="excel-thead" class="bg-slate-50 select-none"></thead>
                <tbody id="excel-tbody" class="divide-y divide-slate-100">
                    <tr>
                        <td class="p-12 text-center text-slate-400 font-medium">Lütfen bekleyin, veriler çekiliyor...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Print Section: Hidden on screen, visible when printed -->
    <div id="print-section" class="hidden"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        document.write('<script src="config.js?v=' + Date.now() + '"><\/script>');
    </script>
    <script>
        lucide.createIcons();
    </script>
    <script>
        document.write('<script src="puantaj.js?v=' + Date.now() + '"><\/script>');
    </script>
</body>

</html>
